  const theme = THEMES[themeName] || THEMES.default;
  const effectiveMode = mode || (settings && settings.mode) || 'auto';
  let isDark;
  if (effectiveMode === 'light') isDark = false;
  else if (effectiveMode === 'dark') isDark = true;
  else isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const palette = isDark ? theme.dark : theme.light;
  const root = document.documentElement;
  for (const [k, v] of Object.entries(palette)) {
    root.style.setProperty('--' + k, v);
  }

let lang = localStorage.getItem(LANG_KEY) === 'es' ? 'es' : 'en';
function t(key) { return (T[lang] && T[lang][key]) || T.en[key] || key; }
function locale() { return lang; }

let state = freshState();
let settings = loadSettings();
let saveTimer = null;
let lastSavedAt = null;
let editingDayIndex = null;

function emptyDay() {
  return { title: '', plan: '', start: '', end: '', startBuffer: 0, endBuffer: 0, actualHours: '' };
}

function hhmmToMinutes(hhmm) {
  if (!hhmm) return null;
  const [h, m] = hhmm.split(':').map(Number);
  if (Number.isNaN(h) || Number.isNaN(m)) return null;
  return h * 60 + m;
}

function minutesToHhmm(mins) {
  const wrapped = ((mins % 1440) + 1440) % 1440;
  const h = Math.floor(wrapped / 60);
  const m = wrapped % 60;
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
}

function normalizeDay(d) {
  d = d || {};
  let startBuffer = Number(d.startBuffer) || 0;
  let endBuffer = Number(d.endBuffer) || 0;
  // Migrate legacy earlyStart/lateEnd into buffer minutes
  if (!startBuffer && d.earlyStart && d.start) {
    const s = hhmmToMinutes(d.start);
    const es = hhmmToMinutes(d.earlyStart);
    if (s !== null && es !== null && s > es) startBuffer = s - es;
  }
  if (!endBuffer && d.lateEnd && d.end) {
    const e = hhmmToMinutes(d.end);
    const le = hhmmToMinutes(d.lateEnd);
    if (e !== null && le !== null && le > e) endBuffer = le - e;
  }
  return {
    title: d.title || '',
    plan: d.plan || '',
    start: d.start || '',
    end: d.end || '',
    startBuffer,
    endBuffer,
    actualHours: (d.actualHours === 0 || d.actualHours) ? String(d.actualHours) : ''
  };
}

function estimatedMinutes(day) {
  const s = hhmmToMinutes(day.start);
  const e = hhmmToMinutes(day.end);
  if (s === null || e === null || e <= s) return 0;
  return e - s;
}

function fmtHoursNumber(h) {
  const n = Number(h);
  if (!Number.isFinite(n) || n < 0) return '0';
  return n.toFixed(2).replace(/\.?0+$/, '');
}

function fmtHoursDecimal(h) {
  const n = Number(h);
  if (!Number.isFinite(n) || n < 0) return '';
  return fmtHoursNumber(n) + 'h';
}

function fmtHoursRange(minMinutes, maxMinutes) {
  if (minMinutes <= 0 && maxMinutes <= 0) return '';
  if (maxMinutes === minMinutes) return fmtHoursDecimal(minMinutes / 60);
  return `${fmtHoursNumber(minMinutes / 60)}–${fmtHoursNumber(maxMinutes / 60)}h`;
}

function maxMinutesWithBuffers(day) {
  const baseMinutes = estimatedMinutes(day);
  if (baseMinutes <= 0) return 0;
  const sBuf = Number(day.startBuffer) || 0;
  const eBuf = Number(day.endBuffer) || 0;
  return baseMinutes + sBuf + eBuf;
}

function estimatedHoursDisplay(day) {
  return fmtHoursRange(estimatedMinutes(day), maxMinutesWithBuffers(day));
}

function actualHoursDisplay(day) {
  if (day.actualHours === '' || day.actualHours == null) return '';
  const v = parseFloat(day.actualHours);
  return Number.isFinite(v) && v >= 0 ? fmtHoursDecimal(v) : '';
}

function bufferOptionsHtml(selected) {
  const sel = Number(selected) || 0;
  const opts = [0, 15, 30, 45, 60];
  let html = '';
  for (const m of opts) {
    const selAttr = m === sel ? ' selected' : '';
    const label = m === 0 ? t('bufferNone') : `${m} ${t('bufferMin')}`;
    html += `<option value="${m}"${selAttr}>${escapeHtml(label)}</option>`;
  }
  return html;
}

const SCHEDULE_COLOR_VARS = ['accent', 'accent-blue', 'accent-gold', 'warning'];

function newScheduleId() {
  return 'sched-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
}

function defaultScheduleName(index) {
  return (t('scheduleN') || 'Schedule {n}').replace('{n}', index + 1);
}

function colorVarForIndex(i) {
  return SCHEDULE_COLOR_VARS[i % SCHEDULE_COLOR_VARS.length];
}

function newSchedule(name, colorVar) {
  return {
    id: newScheduleId(),
    name: name || 'Schedule',
    colorVar: colorVar || 'accent',
    days: Array.from({ length: 7 }, () => emptyDay())
  };
}

function freshState(startIso) {
  const s1 = newSchedule('Schedule 1', 'accent');
  return {
    weekStart: startIso || isoMonday(new Date()),
    schedules: [s1],
    activeId: s1.id
  };
}

function migrateState(data) {
  if (!data || !data.weekStart) return null;
  if (Array.isArray(data.schedules) && data.schedules.length > 0) {
    const schedules = data.schedules.map((s, i) => ({
      id: s.id || newScheduleId(),
      name: s.name || ('Schedule ' + (i + 1)),
      colorVar: s.colorVar || colorVarForIndex(i),
      ownerId: s.ownerId,
      assignedUserId: s.assignedUserId,
      days: Array.isArray(s.days) && s.days.length === 7
        ? s.days.map(normalizeDay)
        : Array.from({ length: 7 }, () => emptyDay())
    }));
    const activeId = data.activeId && (data.activeId === 'master' || schedules.find(s => s.id === data.activeId))
      ? data.activeId
      : schedules[0].id;
    return { weekStart: data.weekStart, schedules, activeId };
  }
  if (Array.isArray(data.days) && data.days.length === 7) {
    const s = {
      id: newScheduleId(),
      name: 'Schedule 1',
      colorVar: 'accent',
      days: data.days.map(normalizeDay)
    };
    return { weekStart: data.weekStart, schedules: [s], activeId: s.id };
  }
  return null;
}

function activeSchedule() {
  if (!state || !state.schedules) return null;
  if (state.activeId === 'master') return null;
  return state.schedules.find(s => s.id === state.activeId) || state.schedules[0] || null;
}

function isMasterView() {
  return state && state.activeId === 'master';
}

function activeDays() {
  const s = activeSchedule();
  return s ? s.days : [];
}

// 'actuals' = a schedule someone else owns that is assigned to me (I log hours
// only); 'plan' = I own it (solo, or as a manager who authors the plan).
function scheduleAccess(s) {
  if (CLOUD.enabled && authUser && authUser.userId && s && s.ownerId &&
      s.ownerId !== authUser.userId && s.assignedUserId === authUser.userId) {
    return 'actuals';
  }
  return 'plan';
}
function activeAccess() { return scheduleAccess(activeSchedule()); }
function activeHasAssignee() { const s = activeSchedule(); return !!(s && s.assignedUserId); }

function isoMonday(d) {
  const date = new Date(d);
  const dow = (date.getDay() + 6) % 7;
  date.setDate(date.getDate() - dow);
  return date.toISOString().slice(0, 10);
}

function addDays(iso, n) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function todayIsoLocal() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function dayDateObj(iso, offset) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + offset);
  return d;
}

function cap(s) {
  return s ? s[0].toLocaleUpperCase(locale()) + s.slice(1) : s;
}

function fmtDayName(iso, offset) {
  return cap(dayDateObj(iso, offset).toLocaleDateString(locale(), { weekday: 'long' }));
}

function fmtDayNameShort(iso, offset) {
  const s = dayDateObj(iso, offset).toLocaleDateString(locale(), { weekday: 'short' });
  return cap(s.replace(/\.$/, ''));
}

function fmtDayDate(iso, offset) {
  return dayDateObj(iso, offset).toLocaleDateString(locale(), { month: 'short', day: 'numeric' });
}

function fmtWeekLabel(iso) {
  const start = new Date(iso + 'T00:00:00');
  const end = new Date(start); end.setDate(end.getDate() + 6);
  const opts = { month: 'long', day: 'numeric' };
  const yearOpts = { ...opts, year: 'numeric' };
  return `${start.toLocaleDateString(locale(), opts)} – ${end.toLocaleDateString(locale(), yearOpts)}`;
}

function timeOptionsHtml(selected, fromHHMM, toHHMM) {
  const from = hhmmToMinutes(fromHHMM);
  const to = hhmmToMinutes(toHHMM);
  const times = [];
  if (from !== null && to !== null && to >= from) {
    for (let m = from; m <= to; m += 15) times.push(minutesToHhmm(m));
  }
  let html = '<option value="">--:--</option>';
  for (const tm of times) {
    const sel = tm === selected ? ' selected' : '';
    html += `<option value="${tm}"${sel}>${escapeHtml(fmtTime(tm))}</option>`;
  }
  return html;
}

function fmtTime(hhmm) {
  if (!hhmm) return '';
  const d = new Date('2000-01-01T' + hhmm + ':00');
  if (isNaN(d.getTime())) return '';
  const formatted = d.toLocaleTimeString(locale(), { hour: 'numeric', minute: '2-digit' });
  if (lang === 'en') {
    return formatted.replace(/[\s  ]*[AaPp]\.?[Mm]\.?/g, '').trim();
  }
  return formatted;
}

function fmtDayDateShort(iso, offset) {
  const d = dayDateObj(iso, offset);
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${m}/${day}`;
}

function dayTimesRowHtml(day) {
  const est = estimatedHoursDisplay(day);
  const estSpan = est ? `<span class="hrs-est">${escapeHtml(est)}</span>` : '';
  return `<div class="day-times-row">${estSpan}${dayTimesInlineHtml(day)}</div>`;
}

function dayActualRowHtml(day) {
  const actual = actualHoursDisplay(day);
  if (!actual) return '';
  return `<div class="day-hours-row"><span class="actual">${escapeHtml(actual)} ${escapeHtml(t('loggedSuffix'))}</span></div>`;
}

// Read-only plan shown to an assigned member while they edit hours (the normal
// .readonly block is hidden in edit mode, so they'd otherwise lose context).
function planRecapHtml(day) {
  let html = dayTimesRowHtml(day);
  if (day.title.trim()) html += `<div class="day-title">${escapeHtml(day.title)}</div>`;
  if (day.plan.trim()) html += `<div class="day-plan">${escapeHtml(day.plan)}</div>`;
  return `<div class="plan-recap">${html}</div>`;
}

// Read-only logged hours shown to a manager editing an assigned schedule's plan,
// so they see plan vs. actual side by side (the actuals field is theirs to read,
// not edit — the member owns it).
function loggedRecapHtml(day) {
  const actual = actualHoursDisplay(day);
  if (!actual) return '';
  return `<div class="day-hours-row logged-recap"><span class="actual">${escapeHtml(actual)} ${escapeHtml(t('loggedSuffix'))}</span></div>`;
}

function dayTimesInlineHtml(day) {
  const start = fmtTime(day.start);
  const end = fmtTime(day.end);
  const sBuf = Number(day.startBuffer) || 0;
  const eBuf = Number(day.endBuffer) || 0;
  const sMin = hhmmToMinutes(day.start);
  const eMin = hhmmToMinutes(day.end);
  const early = (sBuf && sMin !== null) ? fmtTime(minutesToHhmm(sMin - sBuf)) : '';
  const late = (eBuf && eMin !== null) ? fmtTime(minutesToHhmm(eMin + eBuf)) : '';

  if (!start && !end) {
    return `<span class="day-times day-off-mark">${escapeHtml(t('dayOff'))}</span>`;
  }

  let inner = '';
  if (early) inner += `<span class="buffer">${escapeHtml(early)}</span> `;
  if (start) inner += escapeHtml(start);
  if (start && end) inner += ' <span class="dash">–</span> ';
  if (end) inner += escapeHtml(end);
  if (late) inner += ` <span class="buffer">${escapeHtml(late)}</span>`;

  const invalid = isInvalidDayTimes(day);
  return `<span class="day-times${invalid ? ' invalid' : ''}">${inner}</span>`;
}

function isInvalidDayTimes(day) {
  const s = hhmmToMinutes(day.start);
  const e = hhmmToMinutes(day.end);
  return s !== null && e !== null && e <= s;
}

function fmtSavedAt(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const today = new Date();
  const sameDay = d.toDateString() === today.toDateString();
  const time = d.toLocaleTimeString(locale(), { hour: '2-digit', minute: '2-digit' });
  return sameDay
    ? `${t('saved')} ${time}`
    : `${t('saved')} ${d.toLocaleDateString(locale(), { month: 'short', day: 'numeric' })} ${time}`;
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function applyStaticTranslations() {
  document.title = t('title');
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  document.querySelectorAll('[data-i18n-aria-label]').forEach(el => {
    el.setAttribute('aria-label', t(el.dataset.i18nAriaLabel));
  });
  // toggleMode label depends on current mode
  const isEdit = document.body.classList.contains('edit-mode');
  document.getElementById('toggleMode').textContent = isEdit ? t('done') : t('edit');
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function fmtTickHour(mins) {
  const h = Math.floor(mins / 60);
  if (lang === 'es') return String(h);
  if (h === 0) return '12a';
  if (h < 12) return h + 'a';
  if (h === 12) return '12p';
  return (h - 12) + 'p';
}

function dayTimelineHtml(day, dayName, dateLabel) {
  const axisMin = hhmmToMinutes(settings.startMin);
  const axisMax = hhmmToMinutes(settings.endMax);
  if (axisMin === null || axisMax === null || axisMax <= axisMin) return '';
  const range = axisMax - axisMin;

  // Tick positions every 2 hours, aligned to whole hours within [axisMin, axisMax].
  const ticks = [];
  const startHour = Math.ceil(axisMin / 60);
  for (let h = startHour; h * 60 <= axisMax; h += 2) ticks.push(h * 60);

  let axisHtml = '';
  let bars = '';
  for (const m of ticks) {
    const pct = ((m - axisMin) / range) * 100;
    let extraClass = '';
    if (pct <= 1) extraClass = ' lbl-start';
    else if (pct >= 99) extraClass = ' lbl-end';
    axisHtml += `<span class="lbl${extraClass}" style="left:${pct.toFixed(2)}%">${escapeHtml(fmtTickHour(m))}</span>`;
    if (pct > 0 && pct < 100) {
      bars += `<span class="gridline" style="left:${pct.toFixed(2)}%"></span>`;
    }
  }

  const sMin = hhmmToMinutes(day.start);
  const eMin = hhmmToMinutes(day.end);
  if (sMin !== null && eMin !== null && eMin > sMin) {
    const sClamped = clamp(sMin, axisMin, axisMax);
    const eClamped = clamp(eMin, axisMin, axisMax);
    const left = ((sClamped - axisMin) / range) * 100;
    const width = ((eClamped - sClamped) / range) * 100;
    if (day.startBuffer) {
      const bufStart = clamp(sMin - day.startBuffer, axisMin, axisMax);
      const bufLeft = ((bufStart - axisMin) / range) * 100;
      const bufWidth = ((sClamped - bufStart) / range) * 100;
      if (bufWidth > 0) {
        bars += `<div class="t-buffer" style="left:${bufLeft.toFixed(2)}%;width:${bufWidth.toFixed(2)}%"></div>`;
      }
    }
    if (day.endBuffer) {
      const bufEnd = clamp(eMin + day.endBuffer, axisMin, axisMax);
      const bufLeft = ((eClamped - axisMin) / range) * 100;
      const bufWidth = ((bufEnd - eClamped) / range) * 100;
      if (bufWidth > 0) {
        bars += `<div class="t-buffer" style="left:${bufLeft.toFixed(2)}%;width:${bufWidth.toFixed(2)}%"></div>`;
      }
    }
    bars += `<div class="t-bar" style="left:${left.toFixed(2)}%;width:${width.toFixed(2)}%"></div>`;
  }

  const invalid = isInvalidDayTimes(day);
  const labelInner = (dayName || dateLabel)
    ? `${dayName ? `<span class="dn">${escapeHtml(dayName)}</span>` : ''}${dayName && dateLabel ? ' ' : ''}${dateLabel ? `<span class="dt">${escapeHtml(dateLabel)}</span>` : ''}`
    : '';
  return `<div class="day-track-grid">
    <span class="day-track-spacer" aria-hidden="true">${labelInner}</span>
    <div class="day-track-axis">${axisHtml}</div>
    <span class="day-track-date">${labelInner}</span>
    <div class="day-track${invalid ? ' invalid' : ''}">${bars}</div>
  </div>`;
}

function renderWeekSummary() {
  const el = document.getElementById('weekSummary');
  let estMinMinutes = 0;
  let estMaxMinutes = 0;
  let actualTotal = 0;
  let anyActual = false;
  for (const day of activeDays()) {
    estMinMinutes += estimatedMinutes(day);
    estMaxMinutes += maxMinutesWithBuffers(day);
    if (day.actualHours !== '' && day.actualHours != null) {
      const v = parseFloat(day.actualHours);
      if (Number.isFinite(v) && v >= 0) {
        actualTotal += v;
        anyActual = true;
      }
    }
  }
  let parts = [];
  if (estMinMinutes > 0) {
    parts.push(`<span class="lbl">${escapeHtml(t('weekScheduledLabel'))}</span> <span class="est">${escapeHtml(fmtHoursRange(estMinMinutes, estMaxMinutes))}</span>`);
  }
  if (anyActual) {
    parts.push(`<span class="lbl">${escapeHtml(t('weekLoggedLabel'))}</span> <span class="actual">${escapeHtml(fmtHoursDecimal(actualTotal))}</span>`);
  }
  if (parts.length === 0) {
    el.innerHTML = '';
    el.hidden = true;
    return;
  }
  el.innerHTML = parts.join(' <span class="sep">·</span> ');
  el.hidden = false;
}

function renderScheduleTabs() {
  const el = document.getElementById('scheduleTabs');
  let html = '';
  state.schedules.forEach(s => {
    const active = state.activeId === s.id ? ' active' : '';
    html += `<button type="button" class="schedule-tab${active}" data-schedule-id="${escapeHtml(s.id)}">`
      + `<span class="swatch" style="background: var(--${s.colorVar})"></span>`
      + `<span>${escapeHtml(s.name)}</span></button>`;
  });
  if (state.schedules.length > 1) {
    const active = state.activeId === 'master' ? ' active' : '';
    html += `<button type="button" class="schedule-tab master${active}" data-schedule-id="master">`
      + `<span>${escapeHtml(t('masterView'))}</span></button>`;
  }
  html += `<button type="button" class="schedule-tab add" id="addScheduleBtn">${escapeHtml(t('addScheduleBtn'))}</button>`;
  el.innerHTML = html;
}

function renderMasterDays() {
  const todayIso = todayIsoLocal();
  const days = document.getElementById('days');
  days.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const dayIso = addDays(state.weekStart, i);
    const dateLabel = fmtDayDateShort(state.weekStart, i);
    const dayNameShort = fmtDayNameShort(state.weekStart, i);
    const el = document.createElement('div');
    el.className = 'day master-day' + (dayIso === todayIso ? ' today' : '');
    let rows = '';
    state.schedules.forEach(sched => {
      const day = sched.days[i];
      rows += `<div class="master-row">`
        + `<span class="master-row-label" style="color: var(--${sched.colorVar})">${escapeHtml(sched.name)}</span>`
        + masterBarHtml(day, sched.colorVar)
        + `<span class="master-row-times">${dayTimesInlineHtml(day)}</span>`
        + `</div>`;
    });
    el.innerHTML = `
      <div class="day-line"><span class="day-name">${escapeHtml(dayNameShort)}</span> <span class="day-date">${escapeHtml(dateLabel)}</span></div>
      ${rows}
    `;
    days.appendChild(el);
  }
}

function masterBarHtml(day, colorVar) {
  const axisMin = hhmmToMinutes(settings.startMin);
  const axisMax = hhmmToMinutes(settings.endMax);
  if (axisMin === null || axisMax === null || axisMax <= axisMin) return '<div class="day-track master-track"></div>';
  const range = axisMax - axisMin;
  let bars = '';
  const sMin = hhmmToMinutes(day.start);
  const eMin = hhmmToMinutes(day.end);
  if (sMin !== null && eMin !== null && eMin > sMin) {
    const sClamped = clamp(sMin, axisMin, axisMax);
    const eClamped = clamp(eMin, axisMin, axisMax);
    const left = ((sClamped - axisMin) / range) * 100;
    const width = ((eClamped - sClamped) / range) * 100;
    if (day.startBuffer) {
      const bufStart = clamp(sMin - day.startBuffer, axisMin, axisMax);
      const bufLeft = ((bufStart - axisMin) / range) * 100;
      const bufWidth = ((sClamped - bufStart) / range) * 100;
      if (bufWidth > 0) bars += `<div class="t-buffer" style="left:${bufLeft.toFixed(2)}%;width:${bufWidth.toFixed(2)}%;background:var(--${colorVar})"></div>`;
    }
    if (day.endBuffer) {
      const bufEnd = clamp(eMin + day.endBuffer, axisMin, axisMax);
      const bufLeft = ((eClamped - axisMin) / range) * 100;
      const bufWidth = ((bufEnd - eClamped) / range) * 100;
      if (bufWidth > 0) bars += `<div class="t-buffer" style="left:${bufLeft.toFixed(2)}%;width:${bufWidth.toFixed(2)}%;background:var(--${colorVar})"></div>`;
    }
    bars += `<div class="t-bar" style="left:${left.toFixed(2)}%;width:${width.toFixed(2)}%;background:var(--${colorVar})"></div>`;
  }
  return `<div class="day-track master-track">${bars}</div>`;
}

function render() {
  document.getElementById('weekLabel').textContent = fmtWeekLabel(state.weekStart);
  document.getElementById('weekStart').value = state.weekStart;
  renderScheduleTabs();

  if (isMasterView()) {
    document.getElementById('weekSummary').hidden = true;
    document.getElementById('roleHint').hidden = true;
    renderMasterDays();
    return;
  }

  renderWeekSummary();
  // Plan-vs-actuals write split: an owner edits the plan; an assigned member
  // edits only their logged hours. Solo schedules let one person do both.
  const access = activeAccess();
  const canEditPlan = access === 'plan';
  const hasAssignee = activeHasAssignee();
  const canEditActuals = access === 'actuals' || (canEditPlan && !hasAssignee);
  const roleHint = document.getElementById('roleHint');
  if (access === 'actuals') { roleHint.textContent = t('actualsOnlyNote'); roleHint.hidden = false; }
  else { roleHint.hidden = true; }
  const todayIso = todayIsoLocal();
  const days = document.getElementById('days');
  days.innerHTML = '';
  activeDays().forEach((day, i) => {
    const dayIso = addDays(state.weekStart, i);
    const el = document.createElement('div');
    el.className = 'day'
      + (dayIso === todayIso ? ' today' : '')
      + (editingDayIndex === i ? ' editing' : '');

    const dateLabel = fmtDayDateShort(state.weekStart, i);
    const dayNameShort = fmtDayNameShort(state.weekStart, i);
    el.innerHTML = `
      <div class="day-line editable">
        <span class="day-date">${escapeHtml(dateLabel)}</span>
        <span class="sep">|</span>
        <span class="day-name">${escapeHtml(dayNameShort)}</span>
        <span class="sep">|</span>
        ${dayTimesInlineHtml(day)}
      </div>
      <div class="readonly">
        ${dayTimelineHtml(day, dayNameShort, dateLabel)}
        ${dayTimesRowHtml(day)}
        ${dayActualRowHtml(day)}
        ${day.title.trim() ? `<div class="day-title">${escapeHtml(day.title)}</div>` : ''}
        ${day.plan.trim() ? `<div class="day-plan">${escapeHtml(day.plan)}</div>` : ''}
      </div>
      <div class="editable">
        ${canEditPlan ? `
        <div class="field">
          <label>${escapeHtml(t('hours'))}</label>
          <div class="time-row">
            <select class="time-select" data-day="${i}" data-field="start">${timeOptionsHtml(day.start, settings.startMin, settings.startMax)}</select>
            <span class="dash">–</span>
            <select class="time-select" data-day="${i}" data-field="end">${timeOptionsHtml(day.end, settings.endMin, settings.endMax)}</select>
          </div>
        </div>
        <div class="field">
          <label>${escapeHtml(t('bufferLabel'))}</label>
          <div class="time-row">
            <label class="inline-label">${escapeHtml(t('bufferStart'))}
              <select class="time-select" data-day="${i}" data-field="startBuffer">${bufferOptionsHtml(day.startBuffer)}</select>
            </label>
            <label class="inline-label">${escapeHtml(t('bufferEnd'))}
              <select class="time-select" data-day="${i}" data-field="endBuffer">${bufferOptionsHtml(day.endBuffer)}</select>
            </label>
          </div>
        </div>
        <div class="field">
          <label>${escapeHtml(t('themeLabel'))}</label>
          <input type="text" data-day="${i}" data-field="title" value="${escapeHtml(day.title)}" placeholder="${escapeHtml(t('themePlaceholder'))}">
        </div>
        <div class="field">
          <label>${escapeHtml(t('planLabel'))}</label>
          <textarea data-day="${i}" data-field="plan" placeholder="${escapeHtml(t('planPlaceholder'))}">${escapeHtml(day.plan)}</textarea>
        </div>` : planRecapHtml(day)}
        ${canEditActuals ? `
        <div class="field">
          <label>${escapeHtml(t('actualHoursLabel'))}</label>
          <input type="number" min="0" step="0.25" inputmode="decimal"
            class="hours-input"
            data-day="${i}" data-field="actualHours"
            value="${escapeHtml(day.actualHours)}"
            placeholder="${escapeHtml(estimatedHoursDisplay(day) || '')}">
        </div>` : (hasAssignee ? loggedRecapHtml(day) : '')}
        <div class="day-actions">
          ${canEditPlan ? `<button type="button" class="clear-day-btn" data-clear-day="${i}">${escapeHtml(t('clearDay'))}</button>
          ${i < 6 ? `<button type="button" class="copy-next-btn" data-copy-from="${i}">${escapeHtml(t('copyToNext'))}</button>` : ''}` : ''}
          <button type="button" class="day-action-done editing-only primary" data-done-day="${i}">${escapeHtml(t('done'))}</button>
        </div>
      </div>
    `;
    days.appendChild(el);
  });
  renderSavedIndicator();
}

function renderSavedIndicator(override) {
  const el = document.getElementById('savedIndicator');
  if (override) {
    el.textContent = override;
    el.classList.add('unsaved');
    return;
  }
  el.classList.remove('unsaved');
  el.textContent = fmtSavedAt(lastSavedAt);
}

function coerceFieldValue(field, value) {
  if (field === 'startBuffer' || field === 'endBuffer') return Number(value) || 0;
  return value;
}

function syncFromInputs() {
  const days = activeDays();
  document.querySelectorAll('[data-day]').forEach(el => {
    const field = el.dataset.field;
    const idx = +el.dataset.day;
    if (days[idx]) days[idx][field] = coerceFieldValue(field, el.value);
  });
}

function scheduleSave() {
  renderSavedIndicator(t('saving'));
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(DRAFT_KEY, JSON.stringify(state));
      lastSavedAt = new Date().toISOString();
      localStorage.setItem(SAVED_AT_KEY, lastSavedAt);
    } catch (e) {
      // localStorage may be unavailable (private mode, etc.); fail quietly
    }
    renderSavedIndicator();
  }, 400);
  cloudPush();
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return { ...DEFAULT_SETTINGS };
    const p = JSON.parse(raw);
    const validModes = ['auto', 'light', 'dark'];
    return {
      startMin: p.startMin || DEFAULT_SETTINGS.startMin,
      startMax: p.startMax || DEFAULT_SETTINGS.startMax,
      endMin:   p.endMin   || DEFAULT_SETTINGS.endMin,
      endMax:   p.endMax   || DEFAULT_SETTINGS.endMax,
      theme:    (THEMES[p.theme] ? p.theme : DEFAULT_SETTINGS.theme),
      mode:     (validModes.includes(p.mode) ? p.mode : DEFAULT_SETTINGS.mode)
    };
  } catch (e) {
    return { ...DEFAULT_SETTINGS };
  }
}

function saveSettings(s) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch (e) {}
}

function loadDraft() {
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    const migrated = migrateState(data);
    if (!migrated) return null;
    lastSavedAt = localStorage.getItem(SAVED_AT_KEY);
    return migrated;
  } catch (e) {
    return null;
  }
}

function encodeStateToHash(s) {
  const json = JSON.stringify(s);
  const b64 = btoa(unescape(encodeURIComponent(json)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  return '#s=' + b64;
}

function decodeStateFromHash(hash) {
  const m = hash.match(/^#s=(.+)$/);
  if (!m) return null;
  try {
    const b64 = m[1].replace(/-/g, '+').replace(/_/g, '/');
    const padded = b64 + '='.repeat((4 - b64.length % 4) % 4);
    const json = decodeURIComponent(escape(atob(padded)));
    const data = JSON.parse(json);
    return migrateState(data);
  } catch (e) {
    return null;
  }
}

function showToast(msg) {
  const tEl = document.getElementById('toast');
  tEl.textContent = msg;
  tEl.classList.add('show');
  setTimeout(() => tEl.classList.remove('show'), 1800);
}

async function copyToClipboard(text) {

}

document.getElementById('days').addEventListener('click', e => {
  const copyBtn = e.target.closest('.copy-next-btn');
  if (copyBtn) {
    const from = +copyBtn.dataset.copyFrom;
    if (from < 0 || from > 5) return;
    syncFromInputs();
    const days = activeDays();
    days[from + 1] = { ...days[from] };
    render();
    scheduleSave();
    showToast(t('copiedToNext'));
    return;
  }
  const clearBtn = e.target.closest('.clear-day-btn');
  if (clearBtn) {
    const idx = +clearBtn.dataset.clearDay;
    if (idx < 0 || idx > 6) return;
    syncFromInputs();
    const days = activeDays();
    const d = days[idx];
    const hasContent = d.title.trim() || d.plan.trim() ||
      d.start || d.end || d.startBuffer || d.endBuffer;
    if (hasContent && !confirm(t('confirmClearDay'))) return;
    days[idx] = emptyDay();
    render();
    scheduleSave();
    showToast(t('dayCleared'));
    return;
  }
  const doneBtn = e.target.closest('.day-action-done');
  if (doneBtn) {
    if (editingDayIndex !== null) {
      syncFromInputs();
      scheduleSave();
      editingDayIndex = null;
      render();
    }
    return;
  }

  // Card-level click: open this day for editing (view-mode only).
  if (isMasterView()) return;
  if (document.body.classList.contains('edit-mode')) return;
  if (e.target.closest('select, input, textarea, button, label')) return;
  const dayEl = e.target.closest('.day');
  if (!dayEl) return;
  const idx = Array.from(dayEl.parentElement.children).indexOf(dayEl);
  if (editingDayIndex === idx) return;
  if (editingDayIndex !== null) {
    syncFromInputs();
    scheduleSave();
  }
  editingDayIndex = idx;
  render();
});

  };

// ---- Cloud sync (optional; gated by CLOUD.enabled) ------------------------
function sessionToken() { try { return localStorage.getItem(SESSION_KEY); } catch (e) { return null; } }
function setSessionToken(tk) {
  try { tk ? localStorage.setItem(SESSION_KEY, tk) : localStorage.removeItem(SESSION_KEY); } catch (e) {}
}

// Neon Auth (Better Auth). Durable login = a session token (bearer plugin) in
// localStorage, so it survives third-party-cookie blocking on cross-origin.
async function authFetch(path, opts = {}) {
  const headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
  const st = sessionToken();
  if (st) headers['Authorization'] = 'Bearer ' + st;
  const res = await fetch(CLOUD.authBase + path, Object.assign({ credentials: 'include' }, opts, { headers }));
  const setTok = res.headers.get('set-auth-token');
  if (setTok) setSessionToken(setTok);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error((data && (data.message || data.error)) || ('HTTP ' + res.status));
  return data;
}

// Short-lived Data API JWT, fetched from {authBase}/token; refreshed on expiry/401.
let dataJwt = null, dataJwtExp = 0;
async function getDataJwt(force) {
  if (!force && dataJwt && Date.now() < dataJwtExp) return dataJwt;
  const d = await authFetch('/token', { method: 'GET' });
  if (!d || !d.token) throw new Error('No Data API token returned');
  dataJwt = d.token; dataJwtExp = Date.now() + 13 * 60 * 1000;
  return dataJwt;
}

// Neon Data API (PostgREST). Retries once with a fresh JWT on 401.
async function dapi(path, opts = {}, _retry) {
  const jwt = await getDataJwt();
  const headers = Object.assign({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt }, opts.headers || {});
  const res = await fetch(CLOUD.dataApi + path, Object.assign({}, opts, { headers }));
  if (res.status === 401 && !_retry) { await getDataJwt(true); return dapi(path, opts, true); }
  const data = await res.json().catch(() => null);
  if (!res.ok) throw new Error((data && (data.message || data.hint)) || ('Data API HTTP ' + res.status));
  return data;
}
function rpc(name, args) { return dapi('/rpc/' + name, { method: 'POST', body: JSON.stringify(args || {}) }); }
function isServerId(v) { return /^[0-9a-f-]{36}$/i.test(String(v)); }
// RPCs returning a single composite come back as an object or a 1-element array.
function unrow(x) { return Array.isArray(x) ? x[0] : x; }
function decodeJwtSub(jwt) {
  try {
    const b = jwt.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    const p = JSON.parse(decodeURIComponent(escape(atob(b + '='.repeat((4 - b.length % 4) % 4)))));
    return p.sub || p.user_id || null;
  } catch (e) { return null; }
}
function setAuthUserFromProfile(email, prof) {
  authUser = {
    email: (prof && prof.email) || email,
    userId: (prof && prof.user_id) || decodeJwtSub(dataJwt),
    role: (prof && prof.role) || 'user',
    managerId: prof && prof.manager_id
  };
}
function scheduleHasContent(s) {
  return s.days && s.days.some(d => (d.title && d.title.trim()) || (d.plan && d.plan.trim()) ||
    d.start || d.end || d.startBuffer || d.endBuffer || (d.actualHours !== '' && d.actualHours != null));
}

let cloudTimer = null;
function cloudPush() {
  if (!CLOUD.enabled || !authUser) return;
  if (cloudTimer) clearTimeout(cloudTimer);
  cloudTimer = setTimeout(flushSaves, 1200);
}
async function flushSaves() {
  if (!CLOUD.enabled || !authUser) return;
  const week = state.weekStart;
  for (const s of state.schedules.slice()) {
    try {
      // Assigned member: write only this week's actual hours (the plan is the
      // owner's and is preserved server-side).
      if (scheduleAccess(s) === 'actuals') {
        if (!isServerId(s.id)) continue;
        const actuals = s.days.map(d => (d.actualHours === 0 || d.actualHours) ? String(d.actualHours) : '');
        await rpc('save_actuals', { p_schedule_id: s.id, p_week_start: week, p_actuals: actuals });
        continue;
      }
      let id = s.id;
      if (!isServerId(id)) {
        // local-only schedule: create it server-side, then adopt the real id
        const created = await rpc('create_schedule', { p_name: s.name, p_color: s.colorVar });
        const row = unrow(created);
        if (row && row.id) {
          if (state.activeId === s.id) state.activeId = row.id;
          s.id = row.id; id = row.id;
          s.ownerId = row.owner_id || (authUser && authUser.userId);
          try { localStorage.setItem(DRAFT_KEY, JSON.stringify(state)); } catch (e) {}
        }
      } else {
        await rpc('update_schedule', { p_schedule_id: id, p_name: s.name, p_color: s.colorVar });
      }
      // Owner writes the plan; save_plan carries over a member's actualHours.
      await rpc('save_plan', { p_schedule_id: id, p_week_start: week, p_days: s.days });
    } catch (e) { /* offline/error: the local draft remains the source of truth */ }
  }
}

async function cloudPull() {
  if (!CLOUD.enabled || !authUser) return 0;
  const scheds = await dapi('/schedules?select=id,name,color_var,owner_id,assigned_user_id&order=created_at.asc');
  if (Array.isArray(scheds) && scheds.length) {
    const inList = '(' + scheds.map(s => s.id).join(',') + ')';
    const weeks = await dapi('/weeks?select=schedule_id,days&week_start=eq.' +
      encodeURIComponent(state.weekStart) + '&schedule_id=in.' + inList);
    const byId = {}; (weeks || []).forEach(w => { byId[w.schedule_id] = w.days; });
    const schedules = scheds.map(s => ({
      id: s.id, name: s.name, colorVar: s.color_var || 'accent',
      ownerId: s.owner_id, assignedUserId: s.assigned_user_id,
      days: Array.isArray(byId[s.id]) && byId[s.id].length === 7
        ? byId[s.id].map(normalizeDay) : Array.from({ length: 7 }, () => emptyDay())
    }));
    const migrated = migrateState({ weekStart: state.weekStart, schedules, activeId: schedules[0].id });
    if (migrated) { state = migrated; render(); }
  }
  return Array.isArray(scheds) ? scheds.length : 0;
}

function reflectAuth() {
  const btn = document.getElementById('accountBtn');
  if (!btn) return;
  btn.hidden = !CLOUD.enabled;
  btn.textContent = authUser ? authUser.email : t('signIn');
  const out = document.getElementById('accountSignedOut');
  const inn = document.getElementById('accountSignedIn');
  if (out) out.hidden = !!authUser;
  if (inn) inn.hidden = !authUser;
  if (authUser) { const em = document.getElementById('accountEmail'); if (em) em.textContent = authUser.email; }
  reflectTeam();
}

async function doAuth(action) {
  const email = document.getElementById('acctEmail').value.trim();
  const password = document.getElementById('acctPassword').value;
  if (!email || !password) throw new Error('Enter an email and password');
  const roleSel = document.getElementById('acctRole');
  const role = (roleSel && roleSel.value === 'manager') ? 'manager' : 'user';
  if (action === 'signup') {
    await authFetch('/sign-up/email', { method: 'POST', body: JSON.stringify({ email, password, name: email }) });
    if (!sessionToken()) await authFetch('/sign-in/email', { method: 'POST', body: JSON.stringify({ email, password }) });
  } else {
    await authFetch('/sign-in/email', { method: 'POST', body: JSON.stringify({ email, password }) });
  }
  await getDataJwt(true);
  // init_profile is idempotent; it only sets the role on first creation (at
  // signup) and just refreshes the email on later calls.
  let prof = null;
  try {
    prof = unrow(await rpc('init_profile',
      action === 'signup' ? { p_email: email, p_role: role } : { p_email: email }));
  } catch (e) {}
  setAuthUserFromProfile(email, prof);
  const hadLocal = state.schedules && state.schedules.some(scheduleHasContent);
  const n = await cloudPull();
  if (n === 0 && hadLocal) cloudPush();   // move pre-account local work into the new account
  await syncTeam();
  reflectAuth();
}

async function restoreSession() {
  if (!CLOUD.enabled || openedFromShare || !sessionToken()) { reflectAuth(); return; }
  try {
    const s = await authFetch('/get-session', { method: 'GET' });
    const u = s && (s.user || (s.session && s.session.user));
    if (!u || !u.email) throw new Error('no session');
    await getDataJwt(true);
    let prof = null;
    try { prof = unrow(await rpc('init_profile', { p_email: u.email })); } catch (e) {}
    setAuthUserFromProfile(u.email, prof);
    await cloudPull();
    await syncTeam();
  } catch (e) { setSessionToken(null); authUser = null; dataJwt = null; dataJwtExp = 0; }
  reflectAuth();
}

// ---- Teams (Phase 2) ------------------------------------------------------
// Pull the manager's roster (other profiles whose manager_id is me) and any
// pending invites addressed to me. Both are RLS-guarded reads.
async function syncTeam() {
  if (!CLOUD.enabled || !authUser) { teamMembers = []; pendingInvites = []; reflectTeam(); return; }
  try {
    if (authUser.role === 'manager') {
      const profs = await dapi('/profiles?select=user_id,email,manager_id');
      teamMembers = (profs || [])
        .filter(p => p.manager_id === authUser.userId)
        .map(p => ({ userId: p.user_id, email: p.email }));
    } else {
      teamMembers = [];
    }
    // RLS also returns invites I sent (manager_id = me); keep only the ones
    // addressed to me.
    const inv = await dapi('/team_invites?select=id,manager_id,status&status=eq.pending');
    pendingInvites = (inv || []).filter(i => i.manager_id !== authUser.userId);
  } catch (e) { /* keep previous values on a transient error */ }
  reflectTeam();
}

function reflectTeam() {
  const btn = document.getElementById('teamBtn');
  if (!btn) return;
  const show = !!(CLOUD.enabled && authUser &&
    (authUser.role === 'manager' || pendingInvites.length));
  btn.hidden = !show;
  btn.textContent = pendingInvites.length ? `${t('team')} (${pendingInvites.length})` : t('team');
}

function teamMsg(m) {
  const el = document.getElementById('teamMsg');
  if (el) { el.textContent = m || ''; el.hidden = !m; }
}

// Schedules I own (so a manager can assign them) that already exist server-side.
function ownedServerSchedules() {
  return state.schedules.filter(s => isServerId(s.id) && scheduleAccess(s) === 'plan');
}

function renderTeam() {
  const isManager = !!(authUser && authUser.role === 'manager');
  const mgrEl = document.getElementById('teamManager');
  const memEl = document.getElementById('teamMember');
  if (mgrEl) mgrEl.hidden = !isManager;
  if (memEl) memEl.hidden = !pendingInvites.length;

  if (isManager) {
    const ml = document.getElementById('teamMembersList');
    if (ml) {
      ml.innerHTML = teamMembers.length
        ? teamMembers.map(m => `<div class="team-row"><span class="grow">${escapeHtml(m.email || m.userId)}</span></div>`).join('')
        : `<div class="team-empty">${escapeHtml(t('noMembers'))}</div>`;
    }
    const al = document.getElementById('teamAssignList');
    if (al) {
      const scheds = ownedServerSchedules();
      if (!scheds.length || !teamMembers.length) {
        al.innerHTML = `<div class="team-empty">${escapeHtml(scheds.length ? t('noMembers') : t('noSchedulesToAssign'))}</div>`;
      } else {
        al.innerHTML = scheds.map(s => {
          const opts = [`<option value="">${escapeHtml(t('unassigned'))}</option>`].concat(
            teamMembers.map(m => `<option value="${escapeHtml(m.userId)}"${m.userId === s.assignedUserId ? ' selected' : ''}>${escapeHtml(m.email || m.userId)}</option>`)
          ).join('');
          return `<div class="team-row"><span class="grow">${escapeHtml(s.name)}</span>`
            + `<select data-assign-schedule="${escapeHtml(s.id)}">${opts}</select></div>`;
        }).join('');
      }
    }
  }

  if (pendingInvites.length) {
    const il = document.getElementById('teamInvitesList');
    if (il) {
      il.innerHTML = pendingInvites.map(inv =>
        `<div class="team-row"><span class="grow">${escapeHtml(t('inviteFrom'))}</span>`
        + `<span class="invite-actions">`
        + `<button type="button" class="primary" data-accept-invite="${escapeHtml(inv.id)}">${escapeHtml(t('accept'))}</button>`
        + `<button type="button" data-decline-invite="${escapeHtml(inv.id)}">${escapeHtml(t('decline'))}</button>`
        + `</span></div>`).join('');
    }
  }
}

function setupTeamUI() {
  const modal = document.getElementById('teamModal');
  const btn = document.getElementById('teamBtn');
  if (!modal || !btn) return;
  btn.addEventListener('click', () => { teamMsg(''); renderTeam(); modal.hidden = false; });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && !modal.hidden) modal.hidden = true; });

  document.getElementById('inviteBtn').addEventListener('click', async () => {
    const input = document.getElementById('inviteEmailInput');
    const email = (input.value || '').trim();
    if (!email) return;
    try {
      teamMsg('');
      await rpc('invite_to_team', { p_email: email });
      input.value = '';
      showToast(t('invited'));
      await syncTeam(); renderTeam();
    } catch (e) { teamMsg(e.message); }
  });

  // Reassign a schedule when the manager changes its member dropdown.
  modal.addEventListener('change', async e => {
    const sel = e.target.closest('[data-assign-schedule]');
    if (!sel) return;
    const schedId = sel.dataset.assignSchedule;
    const sched = state.schedules.find(s => s.id === schedId);
    const val = sel.value;
    try {
      teamMsg('');
      if (val) await rpc('update_schedule', { p_schedule_id: schedId, p_assigned_user_id: val });
      else await rpc('update_schedule', { p_schedule_id: schedId, p_clear_assignee: true });
      if (sched) sched.assignedUserId = val || undefined;
      try { localStorage.setItem(DRAFT_KEY, JSON.stringify(state)); } catch (err) {}
      render();      // logged-recap vs. actuals-field visibility can change
      renderTeam();
    } catch (err) { teamMsg(err.message); }
  });

  modal.addEventListener('click', async e => {
    if (e.target.closest('[data-modal-close]')) { modal.hidden = true; return; }
    const acc = e.target.closest('[data-accept-invite]');
    const dec = e.target.closest('[data-decline-invite]');
    if (!acc && !dec) return;
    const id = acc ? acc.dataset.acceptInvite : dec.dataset.declineInvite;
    try {
      teamMsg('');
      if (acc) {
        await rpc('accept_invite', { p_invite_id: id });
        showToast(t('inviteAccepted'));
        // refresh my profile (now has manager_id) and pull any assigned schedules
        try { setAuthUserFromProfile(authUser.email, unrow(await rpc('init_profile', { p_email: authUser.email }))); } catch (er) {}
        await syncTeam();
        await cloudPull();
      } else {
        await rpc('decline_invite', { p_invite_id: id });
        showToast(t('inviteDeclined'));
        await syncTeam();
      }
      renderTeam();
      reflectAuth();
      if (!pendingInvites.length && !(authUser && authUser.role === 'manager')) modal.hidden = true;
    } catch (err) { teamMsg(err.message); }
  });
}

function setupCloudUI() {
  const modal = document.getElementById('accountModal');
  const btn = document.getElementById('accountBtn');
  if (!modal || !btn) return;
  btn.hidden = false;
  const msg = m => { const el = document.getElementById('accountMsg'); if (el) { el.textContent = m || ''; el.hidden = !m; } };
  btn.addEventListener('click', () => { reflectAuth(); msg(''); modal.hidden = false; });
  modal.addEventListener('click', e => { if (e.target.closest('[data-modal-close]')) modal.hidden = true; });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && !modal.hidden) modal.hidden = true; });
  const run = action => async () => {
    try { msg('Working…'); await doAuth(action); modal.hidden = true; showToast(t('signedIn')); }
    catch (e) { msg(e.message); }
  };
  document.getElementById('loginBtn').addEventListener('click', run('login'));
  document.getElementById('signupBtn').addEventListener('click', run('signup'));
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try { await authFetch('/sign-out', { method: 'POST', body: '{}' }); } catch (e) {}
    setSessionToken(null); authUser = null; dataJwt = null; dataJwtExp = 0;
    teamMembers = []; pendingInvites = [];
    reflectAuth(); modal.hidden = true;
  });
  setupTeamUI();
  restoreSession();
}

(function init() {
  applyTheme(settings.theme, settings.mode);
  document.body.classList.add('lang-' + lang);
  applyStaticTranslations();
  const fromHash = decodeStateFromHash(location.hash);
  if (fromHash) {
    state = fromHash;
    openedFromShare = true;
    history.replaceState(null, '', location.pathname + location.search);
    render();
    scheduleSave();
    return;
  }
  const draft = loadDraft();
  if (draft) {
    state = draft;
    render();
    return;
  }
  render();
})();

if (CLOUD.enabled) setupCloudUI();
</script>
