<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule</title>
<!-- #LLM-generated -->
<style>
  :root {
    --bg: #faf8f3;
    --card: #ffffff;
    --ink: #1f1f1f;
    --muted: #6b6b6b;
    --accent: #b97441;
    --accent-blue: #b97441;
    --accent-gold: #b97441;
    --warning: #c0524a;
    --border: #e7e2d6;
    --on-accent: #ffffff;
    --today-bg: rgba(185, 116, 65, 0.07);
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161616;
      --card: #1f1f1f;
      --ink: #efece4;
      --muted: #9a9a9a;
      --accent: #d99564;
      --accent-blue: #d99564;
      --accent-gold: #d99564;
      --warning: #e07b6f;
      --border: #2e2e2e;
      --on-accent: #ffffff;
      --today-bg: rgba(217, 149, 100, 0.08);
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 1rem;
    line-height: 1.45;
    font-size: 16px;
  }
  .container { max-width: 720px; margin: 0 auto; }

  header { margin-bottom: 1rem; }
  .header-row {
    display: flex; justify-content: space-between;
    align-items: center; gap: 0.75rem;
  }
  h1 { font-size: 1.15rem; margin: 0; font-weight: 600; flex: 1; min-width: 0; }
  .week-label {
    color: var(--muted); font-size: 0.9rem;
    margin-top: 0.25rem;
    white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .header-actions {
    display: flex; gap: 0.4rem; flex-shrink: 0;
    align-items: center; flex-wrap: wrap; justify-content: flex-end;
  }
  .header-actions button {
    font: inherit; padding: 0.4rem 0.85rem;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--ink); border-radius: 7px; cursor: pointer;
  }
  .header-actions button:hover { border-color: var(--accent); }
  .header-actions button.primary {
    background: var(--accent); color: var(--on-accent); border-color: var(--accent);
  }

  .lang-toggle {
    display: inline-flex; gap: 0.15rem;
    font: inherit; font-size: 0.8rem; font-weight: 600;
    padding: 0.2rem 0.25rem !important;
    background: var(--bg);
    border: 1px solid var(--border); border-radius: 7px;
    cursor: pointer;
  }
  .lang-toggle span {
    padding: 0.15rem 0.45rem; border-radius: 4px;
    color: var(--muted);
    transition: background 0.12s, color 0.12s;
  }
  body.lang-en .lang-toggle span[data-lang="en"],
  body.lang-es .lang-toggle span[data-lang="es"] {
    background: var(--accent); color: var(--on-accent);
  }

  .toolbar {
    display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
    margin: 0 0 1rem; padding: 0.6rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow);
  }
  .toolbar button, .toolbar .file-label {
    font: inherit; padding: 0.4rem 0.85rem;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--ink); border-radius: 7px; cursor: pointer;
    display: inline-block;
  }
  .toolbar button:hover, .toolbar .file-label:hover { border-color: var(--accent); }
  .toolbar .week-picker {
    display: inline-flex; align-items: center; gap: 0.4rem;
    color: var(--muted); font-size: 0.9rem;
  }
  .toolbar input[type=date] {
    font: inherit; padding: 0.35rem 0.45rem; background: var(--bg);
    border: 1px solid var(--border); color: var(--ink); border-radius: 6px;
  }
  .saved-indicator {
    margin-left: auto; font-size: 0.8rem; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .saved-indicator.unsaved { color: var(--accent); }

  textarea, input[type=text], input[type=time], select.time-select {
    font: inherit; padding: 0.5rem;
    background: var(--bg); color: var(--ink);
    border: 1px solid var(--border); border-radius: 6px;
  }
  input[type=text] { width: 100%; }
  textarea { width: 100%; min-height: 3.5rem; line-height: 1.45; resize: vertical; }
  input[type=time] { padding: 0.35rem 0.45rem; }
  select.time-select {
    padding: 0.35rem 0.45rem;
    font-variant-numeric: tabular-nums;
    min-width: 6.5rem;
  }

  .days { display: grid; gap: 0.6rem; }

  .day-track-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: 0.45rem;
    row-gap: 0.05rem;
    margin: 0.3rem 0 0.2rem;
    align-items: center;
  }
  .day-track-grid .day-track-spacer,
  .day-track-grid .day-track-date {
    font-size: 0.7rem;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .day-track-grid .day-track-spacer { visibility: hidden; }
  .day-track-grid .day-track-date { align-self: center; }
  .day-track-grid .day-track-spacer .dn,
  .day-track-grid .day-track-date .dn {
    font-weight: 700;
    color: var(--ink);
  }
  .day-track-grid .day-track-spacer .dt,
  .day-track-grid .day-track-date .dt {
    font-weight: 500;
    color: var(--accent-gold);
  }
  .day.today .day-track-date .dn { color: var(--warning); }
  .day-track-axis {
    position: relative; height: 0.85rem;
  }
  .day-track-axis .lbl {
    position: absolute; top: 0;
    font-size: 0.62rem; color: var(--muted);
    transform: translateX(-50%);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .day-track-axis .lbl.lbl-start { transform: translateX(0); }
  .day-track-axis .lbl.lbl-end   { transform: translateX(-100%); }
  .day-track {
    position: relative; width: 100%;
    height: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .day-track .gridline {
    position: absolute; top: 0; bottom: 0;
    width: 1px; background: var(--border);
  }
  .t-bar {
    position: absolute; top: 0; bottom: 0;
    background: var(--accent);
  }
  .t-buffer {
    position: absolute; top: 0; bottom: 0;
    background: var(--accent-blue); opacity: 0.45;
  }
  .day-track.invalid::after {
    content: ''; position: absolute;
    left: 0; right: 0; top: 50%;
    height: 4px; transform: translateY(-50%);
    background: repeating-linear-gradient(
      -45deg,
      var(--warning) 0 6px,
      transparent 6px 12px
    );
    opacity: 0.75;
  }
  .day {
    position: relative; overflow: hidden;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.65rem 0.85rem 0.65rem 1rem;
    box-shadow: var(--shadow);
  }
  .day::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px; background: var(--warning);
    opacity: 0.5;
  }
  .day.today { background: var(--today-bg); }
  .day.today::before { opacity: 1; }
  .day.today .day-name { color: var(--accent-gold); }
  .day-line {
    display: flex; align-items: baseline;
    gap: 0.5rem;
    margin-bottom: 0.2rem;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    overflow: hidden;
    font-size: 0.95rem;
  }
  .day-line .sep { color: var(--muted); font-weight: 300; }
  .day-line .day-date { color: var(--accent-gold); font-weight: 500; }
  .day-line .day-name { font-weight: 600; }
  .day-line .day-times {
    overflow: hidden; text-overflow: ellipsis;
    flex: 1; min-width: 0;
  }
  .day-times {
    color: var(--accent); font-weight: 600;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .day-times .buffer {
    color: var(--muted); font-weight: 400;
    font-size: 0.82em;
  }
  .day-times .dash { color: var(--warning); font-weight: 700; }
  .day-times.invalid { color: var(--warning); }
  .day-times.invalid .buffer { color: var(--warning); opacity: 0.7; }
  .day-times.day-off-mark {
    color: var(--muted); font-style: italic; font-weight: 400;
  }
  .day-times-row {
    margin-top: 0.15rem;
    font-size: 0.9rem;
    text-align: center;
    word-spacing: 0.35em;
  }
  .day-title {
    color: var(--accent); font-weight: 500;
    margin-bottom: 0.2rem; font-size: 0.95rem;
  }
  .day-plan { white-space: pre-wrap; }
  .day .field { margin-bottom: 0.55rem; }
  .day .field:last-child { margin-bottom: 0; }
  .day-actions {
    display: flex; justify-content: flex-end; gap: 0.4rem;
    margin-top: 0.6rem;
  }
  .day-actions button {
    font: inherit; font-size: 0.85rem;
    padding: 0.35rem 0.7rem;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--muted); border-radius: 6px; cursor: pointer;
  }
  .day-actions button:hover { border-color: var(--accent); color: var(--ink); }
  .day .field > label {
    display: block; font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted); margin-bottom: 0.25rem;
  }
  .time-row {
    display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;
  }
  .time-row .dash { color: var(--muted); }
  .time-row .inline-label {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: 0.85rem; color: var(--muted);
    text-transform: none; letter-spacing: 0; margin-bottom: 0;
  }

  body.view-mode .editable { display: none; }
  body.edit-mode .readonly { display: none; }

  .toast {
    position: fixed; bottom: 1.25rem; left: 50%;
    transform: translateX(-50%) translateY(0.5rem);
    background: var(--ink); color: var(--bg);
    padding: 0.55rem 1rem; border-radius: 7px; font-size: 0.9rem;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    opacity: 0; transition: opacity 0.18s, transform 0.18s;
    pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .modal {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal[hidden] { display: none; }
  .modal-backdrop {
    position: absolute; inset: 0;
    background: rgba(0, 0, 0, 0.45);
  }
  .modal-card {
    position: relative;
    background: var(--card); color: var(--ink);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 1.1rem 1.25rem;
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
    width: 100%; max-width: 360px;
  }
  .modal-card h2 {
    margin: 0 0 0.9rem; font-size: 1rem;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); font-weight: 600;
  }
  .setting-row {
    display: flex; justify-content: space-between;
    align-items: center; gap: 0.75rem;
    margin-bottom: 0.55rem;
  }
  .setting-row label { font-size: 0.92rem; }
  .setting-row input[type=time],
  .setting-row select {
    font: inherit; padding: 0.3rem 0.45rem;
    background: var(--bg); color: var(--ink);
    border: 1px solid var(--border); border-radius: 6px;
  }
  .modal-actions {
    display: flex; justify-content: flex-end; gap: 0.4rem;
    margin-top: 1rem;
  }
  .modal-actions button {
    font: inherit; padding: 0.4rem 0.85rem;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--ink); border-radius: 7px; cursor: pointer;
  }
  .modal-actions button:hover { border-color: var(--accent); }
  .modal-actions button.primary {
    background: var(--accent); color: var(--on-accent); border-color: var(--accent);
  }

  @media (max-width: 520px) {
    body { padding: 0.5rem; font-size: 15px; line-height: 1.35; }
    h1 { font-size: 0.95rem; }
    .week-label { font-size: 0.8rem; margin-top: 0.15rem; }

    header { margin-bottom: 0.5rem; }
    .header-row { gap: 0.5rem; }
    .header-actions { gap: 0.3rem; }
    .header-actions button {
      padding: 0.3rem 0.6rem; font-size: 0.85rem;
    }
    .lang-toggle { font-size: 0.7rem; }
    .lang-toggle span { padding: 0.1rem 0.3rem; }

    .toolbar {
      padding: 0.45rem; gap: 0.3rem;
      margin-bottom: 0.55rem;
    }
    .toolbar button, .toolbar .file-label {
      padding: 0.3rem 0.55rem; font-size: 0.85rem;
    }
    .toolbar .week-picker {
      width: 100%; justify-content: space-between;
      order: -1;
    }
    .saved-indicator {
      margin-left: 0; width: 100%; text-align: right;
      font-size: 0.72rem;
    }

    .days { gap: 0.3rem; }
    .day { padding: 0.5rem 0.75rem 0.5rem 0.85rem; }
    .day::before { width: 3px; }
    .day-line {
      gap: 0.35rem; font-size: 0.85rem;
      margin-bottom: 0.15rem;
    }
    .day-times { font-size: 0.85rem; }
    .day-times-row {
      font-size: 0.85rem; margin-top: 0.1rem;
      word-spacing: 0.3em;
    }

    .day-track-grid {
      margin: 0.15rem 0 0.1rem;
      column-gap: 0.35rem;
    }
    .day-track-grid .day-track-spacer,
    .day-track-grid .day-track-date { font-size: 0.62rem; }
    .day-track-axis { height: 0.7rem; }
    .day-track-axis .lbl { font-size: 0.56rem; }
    .day-track { height: 10px; }

    .day-title { font-size: 0.85rem; margin-bottom: 0.1rem; }
    .day-plan { font-size: 0.85rem; line-height: 1.3; }

    .day .field { margin-bottom: 0.5rem; }
    .day .field > label { font-size: 0.7rem; margin-bottom: 0.2rem; }
    textarea, input[type=text] { padding: 0.45rem; }
    select.time-select {
      min-width: 0; flex: 1 1 0;
      padding: 0.35rem 0.3rem; font-size: 0.9rem;
    }
    .time-row { gap: 0.35rem; }
    .time-row .inline-label {
      flex: 1 1 100%;
      font-size: 0.8rem; gap: 0.4rem;
      justify-content: space-between;
    }
    .time-row .inline-label select.time-select {
      flex: 0 0 60%; max-width: 60%;
    }

    .day-actions { gap: 0.3rem; margin-top: 0.5rem; }
    .day-actions button {
      padding: 0.3rem 0.55rem; font-size: 0.78rem;
    }
  }

  @media print {
    .toolbar, .header-actions { display: none; }
    body { background: white; color: black; padding: 0; }
    .day {
      box-shadow: none; border: 1px solid #ddd;
      page-break-inside: avoid;
    }
  }
</style>
</head>
<body class="view-mode lang-en">
<div class="container">
  <header>
    <div class="header-row">
      <h1 data-i18n="title">Schedule</h1>
      <div class="header-actions">
        <button id="langBtn" class="lang-toggle" type="button" data-i18n-aria-label="toggleLanguage" aria-label="Toggle language">
          <span data-lang="en">EN</span><span data-lang="es">ES</span>
        </button>
        <button id="shareBtn" data-i18n="share">Share</button>
        <button id="toggleMode" class="primary" data-i18n="edit">Edit</button>
      </div>
    </div>
    <div class="week-label" id="weekLabel"></div>
  </header>

  <div class="toolbar editable">
    <button id="exportBtn" data-i18n="export">Export</button>
    <label class="file-label">
      <span data-i18n="import">Import</span>
      <input type="file" id="importFile" accept=".json" hidden>
    </label>
    <button id="duplicateBtn" data-i18n="duplicate">Duplicate &rarr; next week</button>
    <button id="newWeekBtn" data-i18n="newWeek">New (blank) week</button>
    <button id="settingsBtn" data-i18n="settings">Settings</button>
    <div class="week-picker">
      <span data-i18n="weekOf">Week of</span>
      <input type="date" id="weekStart">
    </div>
    <span class="saved-indicator" id="savedIndicator"></span>
  </div>

  <div class="days" id="days"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal" id="settingsModal" hidden>
  <div class="modal-backdrop" data-modal-close></div>
  <div class="modal-card" role="dialog" aria-labelledby="settingsHeading">
    <h2 id="settingsHeading" data-i18n="settingsTitle">Settings</h2>
    <div class="setting-row">
      <label for="setTheme" data-i18n="colorTheme">Color theme</label>
      <select id="setTheme"></select>
    </div>
    <div class="setting-row">
      <label for="setMode" data-i18n="modeLabel">Mode</label>
      <select id="setMode">
        <option value="auto" data-i18n="modeAuto">Auto (system)</option>
        <option value="light" data-i18n="modeLight">Light</option>
        <option value="dark" data-i18n="modeDark">Dark</option>
      </select>
    </div>
    <div class="setting-row">
      <label for="setStartMin" data-i18n="earliestStart">Earliest start</label>
      <input type="time" id="setStartMin">
    </div>
    <div class="setting-row">
      <label for="setStartMax" data-i18n="latestStart">Latest start</label>
      <input type="time" id="setStartMax">
    </div>
    <div class="setting-row">
      <label for="setEndMin" data-i18n="earliestEnd">Earliest end</label>
      <input type="time" id="setEndMin">
    </div>
    <div class="setting-row">
      <label for="setEndMax" data-i18n="latestEnd">Latest end</label>
      <input type="time" id="setEndMax">
    </div>
    <div class="modal-actions">
      <button id="settingsResetBtn" type="button" data-i18n="reset">Reset</button>
      <button id="settingsCancelBtn" type="button" data-modal-close data-i18n="cancel">Cancel</button>
      <button id="settingsSaveBtn" type="button" class="primary" data-i18n="save">Save</button>
    </div>
  </div>
</div>

<script>
const DRAFT_KEY = 'nanny-schedule-draft';
const SAVED_AT_KEY = 'nanny-schedule-saved-at';
const LANG_KEY = 'nanny-schedule-lang';
const SETTINGS_KEY = 'nanny-schedule-settings';
const DEFAULT_SETTINGS = {
  startMin: '07:00', startMax: '15:00',
  endMin: '12:00',  endMax: '20:00',
  theme: 'default',
  mode: 'auto'
};

const THEMES = {
  default: {
    label: { en: 'Default', es: 'Por defecto' },
    light: {
      bg: '#faf8f3', card: '#ffffff', ink: '#1f1f1f', muted: '#6b6b6b',
      accent: '#b97441', 'accent-blue': '#b97441', 'accent-gold': '#b97441',
      warning: '#c0524a', border: '#e7e2d6', 'on-accent': '#ffffff',
      'today-bg': 'rgba(185, 116, 65, 0.07)',
      shadow: '0 1px 2px rgba(0, 0, 0, 0.04)'
    },
    dark: {
      bg: '#161616', card: '#1f1f1f', ink: '#efece4', muted: '#9a9a9a',
      accent: '#d99564', 'accent-blue': '#d99564', 'accent-gold': '#d99564',
      warning: '#e07b6f', border: '#2e2e2e', 'on-accent': '#ffffff',
      'today-bg': 'rgba(217, 149, 100, 0.08)',
      shadow: '0 1px 2px rgba(0, 0, 0, 0.2)'
    }
  },
  colombia: {
    label: { en: 'Colombia', es: 'Colombia' },
    light: {
      bg: '#f4f6fa', card: '#ffffff', ink: '#1a1f2e', muted: '#6b7a8c',
      accent: '#003893', 'accent-blue': '#ce1126', 'accent-gold': '#a07522',
      warning: '#ce1126', border: '#d6dde6', 'on-accent': '#ffffff',
      'today-bg': 'rgba(252, 209, 22, 0.13)',
      shadow: '0 1px 2px rgba(0, 20, 60, 0.06)'
    },
    dark: {
      bg: '#0e1626', card: '#182338', ink: '#ebeef6', muted: '#8d9aae',
      accent: '#5d8acf', 'accent-blue': '#e07069', 'accent-gold': '#fcd116',
      warning: '#e07069', border: '#2a3548', 'on-accent': '#1c1814',
      'today-bg': 'rgba(252, 209, 22, 0.13)',
      shadow: '0 1px 2px rgba(0, 0, 0, 0.3)'
    }
  },
  ocean: {
    label: { en: 'Ocean', es: 'Océano' },
    light: {
      bg: '#eef5f8', card: '#ffffff', ink: '#1d2a35', muted: '#5b7385',
      accent: '#2e7a96', 'accent-blue': '#3d5a98', 'accent-gold': '#dd8b56',
      warning: '#c85a52', border: '#d4e0e8', 'on-accent': '#ffffff',
      'today-bg': 'rgba(221, 139, 86, 0.10)',
      shadow: '0 1px 2px rgba(30, 60, 90, 0.06)'
    },
    dark: {
      bg: '#0e1a22', card: '#152431', ink: '#e0eaf0', muted: '#7a96aa',
      accent: '#58b5d5', 'accent-blue': '#6a8acf', 'accent-gold': '#e8a87a',
      warning: '#e57867', border: '#2a3a48', 'on-accent': '#0c1620',
      'today-bg': 'rgba(232, 168, 122, 0.10)',
      shadow: '0 1px 2px rgba(0, 0, 0, 0.3)'
    }
  },
  forest: {
    label: { en: 'Forest', es: 'Bosque' },
    light: {
      bg: '#f1f4ed', card: '#ffffff', ink: '#1f2a1c', muted: '#637058',
      accent: '#4a6b3f', 'accent-blue': '#6a8d3d', 'accent-gold': '#a87a3f',

  const theme = THEMES[themeName] || THEMES.default;
  const effectiveMode = mode || (settings && settings.mode) || 'auto';
  let isDark;
  if (effectiveMode === 'light') isDark = false;
  else if (effectiveMode === 'dark') isDark = true;
  else isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const palette = isDark ? theme.dark : theme.light;
  const root = document.documentElement;
  for (const [k, v] of Object.entries(palette)) {
    root.style.setProperty('--' + k, v);
  }
}

let lang = localStorage.getItem(LANG_KEY) === 'es' ? 'es' : 'en';
function t(key) { return (T[lang] && T[lang][key]) || T.en[key] || key; }
function locale() { return lang; }

let state = freshState();
let settings = loadSettings();
let saveTimer = null;
let lastSavedAt = null;

function emptyDay() {
  return { title: '', plan: '', start: '', end: '', startBuffer: 0, endBuffer: 0 };
}

function hhmmToMinutes(hhmm) {
  if (!hhmm) return null;
  const [h, m] = hhmm.split(':').map(Number);
  if (Number.isNaN(h) || Number.isNaN(m)) return null;
  return h * 60 + m;
}

function minutesToHhmm(mins) {
  const wrapped = ((mins % 1440) + 1440) % 1440;
  const h = Math.floor(wrapped / 60);
  const m = wrapped % 60;
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
}

function normalizeDay(d) {
  d = d || {};
  let startBuffer = Number(d.startBuffer) || 0;
  let endBuffer = Number(d.endBuffer) || 0;
  // Migrate legacy earlyStart/lateEnd into buffer minutes
  if (!startBuffer && d.earlyStart && d.start) {
    const s = hhmmToMinutes(d.start);
    const es = hhmmToMinutes(d.earlyStart);
    if (s !== null && es !== null && s > es) startBuffer = s - es;
  }
  if (!endBuffer && d.lateEnd && d.end) {
    const e = hhmmToMinutes(d.end);
    const le = hhmmToMinutes(d.lateEnd);
    if (e !== null && le !== null && le > e) endBuffer = le - e;
  }
  return {
    title: d.title || '',
    plan: d.plan || '',
    start: d.start || '',
    end: d.end || '',
    startBuffer,
    endBuffer
  };
}

function bufferOptionsHtml(selected) {
  const sel = Number(selected) || 0;
  const opts = [0, 15, 30, 45, 60];
  let html = '';
  for (const m of opts) {
    const selAttr = m === sel ? ' selected' : '';
    const label = m === 0 ? t('bufferNone') : `${m} ${t('bufferMin')}`;
    html += `<option value="${m}"${selAttr}>${escapeHtml(label)}</option>`;
  }
  return html;
}

function freshState(startIso) {
  return {
    weekStart: startIso || isoMonday(new Date()),
    days: Array.from({ length: 7 }, () => emptyDay())
  };
}

function isoMonday(d) {
  const date = new Date(d);
  const dow = (date.getDay() + 6) % 7;
  date.setDate(date.getDate() - dow);
  return date.toISOString().slice(0, 10);
}

function addDays(iso, n) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function todayIsoLocal() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function dayDateObj(iso, offset) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + offset);
  return d;
}

function cap(s) {
  return s ? s[0].toLocaleUpperCase(locale()) + s.slice(1) : s;
}

function fmtDayName(iso, offset) {
  return cap(dayDateObj(iso, offset).toLocaleDateString(locale(), { weekday: 'long' }));
}

function fmtDayNameShort(iso, offset) {
  const s = dayDateObj(iso, offset).toLocaleDateString(locale(), { weekday: 'short' });
  return cap(s.replace(/\.$/, ''));
}

function fmtDayDate(iso, offset) {
  return dayDateObj(iso, offset).toLocaleDateString(locale(), { month: 'short', day: 'numeric' });
}

function fmtWeekLabel(iso) {
  const start = new Date(iso + 'T00:00:00');
  const end = new Date(start); end.setDate(end.getDate() + 6);
  const opts = { month: 'long', day: 'numeric' };
  const yearOpts = { ...opts, year: 'numeric' };
  return `${start.toLocaleDateString(locale(), opts)} – ${end.toLocaleDateString(locale(), yearOpts)}`;
}

function timeOptionsHtml(selected, fromHHMM, toHHMM) {
  const from = hhmmToMinutes(fromHHMM);
  const to = hhmmToMinutes(toHHMM);
  const times = [];
  if (from !== null && to !== null && to >= from) {
    for (let m = from; m <= to; m += 15) times.push(minutesToHhmm(m));
  }
  let html = '<option value="">--:--</option>';
  for (const tm of times) {
    const sel = tm === selected ? ' selected' : '';
    html += `<option value="${tm}"${sel}>${escapeHtml(fmtTime(tm))}</option>`;
  }
  return html;
}

function fmtTime(hhmm) {
  if (!hhmm) return '';
  const d = new Date('2000-01-01T' + hhmm + ':00');
  if (isNaN(d.getTime())) return '';
  return d.toLocaleTimeString(locale(), { hour: 'numeric', minute: '2-digit' });
}

function fmtDayDateShort(iso, offset) {
  const d = dayDateObj(iso, offset);
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${m}/${day}`;
}

function dayTimesInlineHtml(day) {
  const start = fmtTime(day.start);
  const end = fmtTime(day.end);
  const sBuf = Number(day.startBuffer) || 0;
  const eBuf = Number(day.endBuffer) || 0;
  const sMin = hhmmToMinutes(day.start);
  const eMin = hhmmToMinutes(day.end);
  const early = (sBuf && sMin !== null) ? fmtTime(minutesToHhmm(sMin - sBuf)) : '';
  const late = (eBuf && eMin !== null) ? fmtTime(minutesToHhmm(eMin + eBuf)) : '';

  if (!start && !end) {
    return `<span class="day-times day-off-mark">${escapeHtml(t('dayOff'))}</span>`;
  }

  let inner = '';
  if (early) inner += `<span class="buffer">${escapeHtml(early)}</span> `;
  if (start) inner += escapeHtml(start);
  if (start && end) inner += ' <span class="dash">–</span> ';
  if (end) inner += escapeHtml(end);
  if (late) inner += ` <span class="buffer">${escapeHtml(late)}</span>`;

  const invalid = isInvalidDayTimes(day);
  return `<span class="day-times${invalid ? ' invalid' : ''}">${inner}</span>`;
}

function isInvalidDayTimes(day) {
  const s = hhmmToMinutes(day.start);
  const e = hhmmToMinutes(day.end);
  return s !== null && e !== null && e <= s;
}

function fmtSavedAt(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const today = new Date();
  const sameDay = d.toDateString() === today.toDateString();
  const time = d.toLocaleTimeString(locale(), { hour: '2-digit', minute: '2-digit' });
  return sameDay
    ? `${t('saved')} ${time}`
    : `${t('saved')} ${d.toLocaleDateString(locale(), { month: 'short', day: 'numeric' })} ${time}`;
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function applyStaticTranslations() {
  document.title = t('title');
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  document.querySelectorAll('[data-i18n-aria-label]').forEach(el => {
    el.setAttribute('aria-label', t(el.dataset.i18nAriaLabel));
  });
  // toggleMode label depends on current mode
  const isEdit = document.body.classList.contains('edit-mode');
  document.getElementById('toggleMode').textContent = isEdit ? t('done') : t('edit');
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function fmtTickHour(mins) {
  const h = Math.floor(mins / 60);
  if (lang === 'es') return String(h);
  if (h === 0) return '12a';
  if (h < 12) return h + 'a';
  if (h === 12) return '12p';
  return (h - 12) + 'p';
}

function dayTimelineHtml(day, dayName, dateLabel) {
  const axisMin = hhmmToMinutes(settings.startMin);
  const axisMax = hhmmToMinutes(settings.endMax);
  if (axisMin === null || axisMax === null || axisMax <= axisMin) return '';
  const range = axisMax - axisMin;

  // Tick positions every 2 hours, aligned to whole hours within [axisMin, axisMax].
  const ticks = [];
  const startHour = Math.ceil(axisMin / 60);
  for (let h = startHour; h * 60 <= axisMax; h += 2) ticks.push(h * 60);

  let axisHtml = '';
  let bars = '';
  for (const m of ticks) {
    const pct = ((m - axisMin) / range) * 100;
    let extraClass = '';
    if (pct <= 1) extraClass = ' lbl-start';
    else if (pct >= 99) extraClass = ' lbl-end';
    axisHtml += `<span class="lbl${extraClass}" style="left:${pct.toFixed(2)}%">${escapeHtml(fmtTickHour(m))}</span>`;
    if (pct > 0 && pct < 100) {
      bars += `<span class="gridline" style="left:${pct.toFixed(2)}%"></span>`;
    }
  }

  const sMin = hhmmToMinutes(day.start);
  const eMin = hhmmToMinutes(day.end);
  if (sMin !== null && eMin !== null && eMin > sMin) {
    const sClamped = clamp(sMin, axisMin, axisMax);
    const eClamped = clamp(eMin, axisMin, axisMax);
    const left = ((sClamped - axisMin) / range) * 100;
    const width = ((eClamped - sClamped) / range) * 100;
    if (day.startBuffer) {
      const bufStart = clamp(sMin - day.startBuffer, axisMin, axisMax);
      const bufLeft = ((bufStart - axisMin) / range) * 100;
      const bufWidth = ((sClamped - bufStart) / range) * 100;
      if (bufWidth > 0) {
        bars += `<div class="t-buffer" style="left:${bufLeft.toFixed(2)}%;width:${bufWidth.toFixed(2)}%"></div>`;
      }
    }
    if (day.endBuffer) {
      const bufEnd = clamp(eMin + day.endBuffer, axisMin, axisMax);
      const bufLeft = ((eClamped - axisMin) / range) * 100;
      const bufWidth = ((bufEnd - eClamped) / range) * 100;
      if (bufWidth > 0) {
        bars += `<div class="t-buffer" style="left:${bufLeft.toFixed(2)}%;width:${bufWidth.toFixed(2)}%"></div>`;
      }
    }
    bars += `<div class="t-bar" style="left:${left.toFixed(2)}%;width:${width.toFixed(2)}%"></div>`;
  }

  const invalid = isInvalidDayTimes(day);
  const labelInner = (dayName || dateLabel)
    ? `${dayName ? `<span class="dn">${escapeHtml(dayName)}</span>` : ''}${dayName && dateLabel ? ' ' : ''}${dateLabel ? `<span class="dt">${escapeHtml(dateLabel)}</span>` : ''}`
    : '';
  return `<div class="day-track-grid">
    <span class="day-track-spacer" aria-hidden="true">${labelInner}</span>
    <div class="day-track-axis">${axisHtml}</div>
    <span class="day-track-date">${labelInner}</span>
    <div class="day-track${invalid ? ' invalid' : ''}">${bars}</div>
  </div>`;
}

function render() {
  document.getElementById('weekLabel').textContent = fmtWeekLabel(state.weekStart);
  document.getElementById('weekStart').value = state.weekStart;

  const todayIso = todayIsoLocal();
  const days = document.getElementById('days');
  days.innerHTML = '';
  state.days.forEach((day, i) => {
    const dayIso = addDays(state.weekStart, i);
    const el = document.createElement('div');
    el.className = 'day' + (dayIso === todayIso ? ' today' : '');

    const dateLabel = fmtDayDateShort(state.weekStart, i);
    const dayNameShort = fmtDayNameShort(state.weekStart, i);
    el.innerHTML = `
      <div class="day-line editable">
        <span class="day-date">${escapeHtml(dateLabel)}</span>
        <span class="sep">|</span>
        <span class="day-name">${escapeHtml(dayNameShort)}</span>
        <span class="sep">|</span>
        ${dayTimesInlineHtml(day)}
      </div>
      <div class="readonly">
        ${dayTimelineHtml(day, dayNameShort, dateLabel)}
        <div class="day-times-row">${dayTimesInlineHtml(day)}</div>
        ${day.title.trim() ? `<div class="day-title">${escapeHtml(day.title)}</div>` : ''}
        ${day.plan.trim() ? `<div class="day-plan">${escapeHtml(day.plan)}</div>` : ''}
      </div>
      <div class="editable">
        <div class="field">
          <label>${escapeHtml(t('hours'))}</label>
          <div class="time-row">
            <select class="time-select" data-day="${i}" data-field="start">${timeOptionsHtml(day.start, settings.startMin, settings.startMax)}</select>
            <span class="dash">–</span>
            <select class="time-select" data-day="${i}" data-field="end">${timeOptionsHtml(day.end, settings.endMin, settings.endMax)}</select>
          </div>
        </div>
        <div class="field">
          <label>${escapeHtml(t('bufferLabel'))}</label>
          <div class="time-row">
            <label class="inline-label">${escapeHtml(t('bufferStart'))}
              <select class="time-select" data-day="${i}" data-field="startBuffer">${bufferOptionsHtml(day.startBuffer)}</select>
            </label>
            <label class="inline-label">${escapeHtml(t('bufferEnd'))}
              <select class="time-select" data-day="${i}" data-field="endBuffer">${bufferOptionsHtml(day.endBuffer)}</select>
            </label>
          </div>
        </div>
        <div class="field">
          <label>${escapeHtml(t('themeLabel'))}</label>
          <input type="text" data-day="${i}" data-field="title" value="${escapeHtml(day.title)}" placeholder="${escapeHtml(t('themePlaceholder'))}">
        </div>
        <div class="field">
          <label>${escapeHtml(t('planLabel'))}</label>
          <textarea data-day="${i}" data-field="plan" placeholder="${escapeHtml(t('planPlaceholder'))}">${escapeHtml(day.plan)}</textarea>
        </div>
        <div class="day-actions">
          <button type="button" class="clear-day-btn" data-clear-day="${i}">${escapeHtml(t('clearDay'))}</button>
          ${i < 6 ? `<button type="button" class="copy-next-btn" data-copy-from="${i}">${escapeHtml(t('copyToNext'))}</button>` : ''}
        </div>
      </div>
    `;
    days.appendChild(el);
  });
  renderSavedIndicator();
}

function renderSavedIndicator(override) {
  const el = document.getElementById('savedIndicator');
  if (override) {
    el.textContent = override;
    el.classList.add('unsaved');
    return;
  }
  el.classList.remove('unsaved');
  el.textContent = fmtSavedAt(lastSavedAt);
}

function coerceFieldValue(field, value) {
  if (field === 'startBuffer' || field === 'endBuffer') return Number(value) || 0;
  return value;
}

function syncFromInputs() {
  document.querySelectorAll('[data-day]').forEach(el => {
    const field = el.dataset.field;
    state.days[+el.dataset.day][field] = coerceFieldValue(field, el.value);
  });
}

function scheduleSave() {
  renderSavedIndicator(t('saving'));
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(DRAFT_KEY, JSON.stringify(state));
      lastSavedAt = new Date().toISOString();
      localStorage.setItem(SAVED_AT_KEY, lastSavedAt);
    } catch (e) {
      // localStorage may be unavailable (private mode, etc.); fail quietly
    }
    renderSavedIndicator();
  }, 400);
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return { ...DEFAULT_SETTINGS };
    const p = JSON.parse(raw);
    const validModes = ['auto', 'light', 'dark'];
    return {
      startMin: p.startMin || DEFAULT_SETTINGS.startMin,
      startMax: p.startMax || DEFAULT_SETTINGS.startMax,
      endMin:   p.endMin   || DEFAULT_SETTINGS.endMin,
      endMax:   p.endMax   || DEFAULT_SETTINGS.endMax,
      theme:    (THEMES[p.theme] ? p.theme : DEFAULT_SETTINGS.theme),
      mode:     (validModes.includes(p.mode) ? p.mode : DEFAULT_SETTINGS.mode)
    };
  } catch (e) {
    return { ...DEFAULT_SETTINGS };
  }
}

function saveSettings(s) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch (e) {}
}

function loadDraft() {
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!data.weekStart || !Array.isArray(data.days) || data.days.length !== 7) return null;
    lastSavedAt = localStorage.getItem(SAVED_AT_KEY);
    return {
      weekStart: data.weekStart,
      days: data.days.map(normalizeDay)
    };
  } catch (e) {
    return null;
  }
}

function encodeStateToHash(s) {
  const json = JSON.stringify(s);
  const b64 = btoa(unescape(encodeURIComponent(json)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  return '#s=' + b64;
}

function decodeStateFromHash(hash) {
  const m = hash.match(/^#s=(.+)$/);
  if (!m) return null;
  try {
    const b64 = m[1].replace(/-/g, '+').replace(/_/g, '/');
    const padded = b64 + '='.repeat((4 - b64.length % 4) % 4);
    const json = decodeURIComponent(escape(atob(padded)));
    const data = JSON.parse(json);
    if (!data.weekStart || !Array.isArray(data.days) || data.days.length !== 7) return null;
    return {
      weekStart: data.weekStart,
      days: data.days.map(normalizeDay)
    };
  } catch (e) {
    return null;
  }
}

function showToast(msg) {
  const tEl = document.getElementById('toast');
  tEl.textContent = msg;
  tEl.classList.add('show');
  setTimeout(() => tEl.classList.remove('show'), 1800);
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (e) {
    return false;
  }
}

function setLang(newLang) {
  document.body.classList.remove('lang-' + lang);
  lang = newLang;
  document.body.classList.add('lang-' + lang);
  localStorage.setItem(LANG_KEY, lang);
  applyStaticTranslations();
  render();
}

// --- Event wiring ---

document.getElementById('langBtn').addEventListener('click', () => {
  setLang(lang === 'en' ? 'es' : 'en');
});

document.getElementById('toggleMode').addEventListener('click', () => {
  const isEdit = document.body.classList.contains('edit-mode');
  if (isEdit) {
    syncFromInputs();
    document.body.classList.replace('edit-mode', 'view-mode');
    document.getElementById('toggleMode').textContent = t('edit');
    render();
  } else {
    document.body.classList.replace('view-mode', 'edit-mode');
    document.getElementById('toggleMode').textContent = t('done');
  }
});

document.getElementById('weekStart').addEventListener('change', e => {
  syncFromInputs();
  state.weekStart = e.target.value;
  render();
  scheduleSave();
});

document.getElementById('days').addEventListener('input', e => {
  const target = e.target;
  if (target.dataset && target.dataset.day !== undefined) {
    const field = target.dataset.field;
    state.days[+target.dataset.day][field] = coerceFieldValue(field, target.value);
    scheduleSave();
  }
});

document.getElementById('days').addEventListener('click', e => {
  const copyBtn = e.target.closest('.copy-next-btn');
  if (copyBtn) {
    const from = +copyBtn.dataset.copyFrom;
    if (from < 0 || from > 5) return;
    syncFromInputs();
    state.days[from + 1] = { ...state.days[from] };
    render();
    scheduleSave();
    showToast(t('copiedToNext'));
    return;
  }
  const clearBtn = e.target.closest('.clear-day-btn');
  if (clearBtn) {
    const idx = +clearBtn.dataset.clearDay;
    if (idx < 0 || idx > 6) return;
    syncFromInputs();
    const d = state.days[idx];
    const hasContent = d.title.trim() || d.plan.trim() ||
      d.start || d.end || d.startBuffer || d.endBuffer;
    if (hasContent && !confirm(t('confirmClearDay'))) return;
    state.days[idx] = emptyDay();
    render();
    scheduleSave();
    showToast(t('dayCleared'));
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  syncFromInputs();
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `nanny-schedule-${state.weekStart}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});

document.getElementById('importFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.weekStart || !Array.isArray(data.days) || data.days.length !== 7) {
        throw new Error(t('invalidFile'));
      }
      state = {
        weekStart: data.weekStart,
        days: data.days.map(normalizeDay)
      };
      render();
      scheduleSave();
    } catch (err) {
      alert(t('loadError') + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('newWeekBtn').addEventListener('click', () => {
  syncFromInputs();
  const hasContent = state.days.some(d =>
    d.title.trim() || d.plan.trim() || d.start || d.end || d.startBuffer || d.endBuffer);
  if (hasContent && !confirm(t('confirmNewWeek'))) return;
  state = freshState(addDays(state.weekStart, 7));
  render();
  scheduleSave();
});

document.getElementById('duplicateBtn').addEventListener('click', () => {
  if (!confirm(t('confirmDuplicate'))) return;
  syncFromInputs();
  state = {
    weekStart: addDays(state.weekStart, 7),
    days: state.days.map(d => ({ ...d }))
  };
  render();
  scheduleSave();
  showToast(t('duplicated'));
});

document.getElementById('shareBtn').addEventListener('click', async () => {
  syncFromInputs();
  const url = location.origin + location.pathname + encodeStateToHash(state);
  const ok = await copyToClipboard(url);
  if (ok) {
    showToast(t('shareCopied'));
  } else {
    window.prompt(t('sharePrompt'), url);
  }
});

// --- Settings modal ---

const settingsModal = document.getElementById('settingsModal');
let themeOnOpen = null;
let modeOnOpen = null;

function populateThemeOptions(selected) {
  const select = document.getElementById('setTheme');
  select.innerHTML = Object.entries(THEMES).map(([key, theme]) => {
    const sel = key === selected ? ' selected' : '';
    const label = (theme.label && theme.label[lang]) || theme.label.en || key;
    return `<option value="${key}"${sel}>${escapeHtml(label)}</option>`;
  }).join('');
}

function currentModalSelections() {
  return {
    theme: document.getElementById('setTheme').value,
    mode:  document.getElementById('setMode').value
  };
}

function openSettings() {
  populateThemeOptions(settings.theme);
  document.getElementById('setMode').value     = settings.mode;
  document.getElementById('setStartMin').value = settings.startMin;
  document.getElementById('setStartMax').value = settings.startMax;
  document.getElementById('setEndMin').value   = settings.endMin;
  document.getElementById('setEndMax').value   = settings.endMax;
  themeOnOpen = settings.theme;
  modeOnOpen = settings.mode;
  settingsModal.hidden = false;
}

function closeSettings() {
  // Revert any unsaved theme / mode preview.
  if (themeOnOpen !== null || modeOnOpen !== null) {
    applyTheme(themeOnOpen || settings.theme, modeOnOpen || settings.mode);
    themeOnOpen = null;
    modeOnOpen = null;
  }
  settingsModal.hidden = true;
}

document.getElementById('settingsBtn').addEventListener('click', openSettings);

settingsModal.addEventListener('click', e => {
  if (e.target.closest('[data-modal-close]')) closeSettings();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !settingsModal.hidden) closeSettings();
});

document.getElementById('setTheme').addEventListener('change', () => {
  const sel = currentModalSelections();
  applyTheme(sel.theme, sel.mode);
});

document.getElementById('setMode').addEventListener('change', () => {
  const sel = currentModalSelections();
  applyTheme(sel.theme, sel.mode);
});

document.getElementById('settingsResetBtn').addEventListener('click', () => {
  document.getElementById('setStartMin').value = DEFAULT_SETTINGS.startMin;
  document.getElementById('setStartMax').value = DEFAULT_SETTINGS.startMax;
  document.getElementById('setEndMin').value   = DEFAULT_SETTINGS.endMin;
  document.getElementById('setEndMax').value   = DEFAULT_SETTINGS.endMax;
  document.getElementById('setTheme').value    = DEFAULT_SETTINGS.theme;
  document.getElementById('setMode').value     = DEFAULT_SETTINGS.mode;
  applyTheme(DEFAULT_SETTINGS.theme, DEFAULT_SETTINGS.mode);
});

document.getElementById('settingsSaveBtn').addEventListener('click', () => {
  const sel = currentModalSelections();
  const validModes = ['auto', 'light', 'dark'];
  const next = {
    startMin: document.getElementById('setStartMin').value || DEFAULT_SETTINGS.startMin,
    startMax: document.getElementById('setStartMax').value || DEFAULT_SETTINGS.startMax,
    endMin:   document.getElementById('setEndMin').value   || DEFAULT_SETTINGS.endMin,
    endMax:   document.getElementById('setEndMax').value   || DEFAULT_SETTINGS.endMax,
    theme:    THEMES[sel.theme] ? sel.theme : DEFAULT_SETTINGS.theme,
    mode:     validModes.includes(sel.mode) ? sel.mode : DEFAULT_SETTINGS.mode
  };
  // If max < min, swap so the range is always valid.
  if (hhmmToMinutes(next.startMax) < hhmmToMinutes(next.startMin)) {
    [next.startMin, next.startMax] = [next.startMax, next.startMin];
  }
  if (hhmmToMinutes(next.endMax) < hhmmToMinutes(next.endMin)) {
    [next.endMin, next.endMax] = [next.endMax, next.endMin];
  }
  settings = next;
  saveSettings(settings);
  applyTheme(settings.theme, settings.mode);
  themeOnOpen = null;
  modeOnOpen = null;
  settingsModal.hidden = true;
  syncFromInputs();
  render();
});

// --- Init ---

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (settings.mode === 'auto') applyTheme(settings.theme, settings.mode);
});

(function init() {
  applyTheme(settings.theme, settings.mode);
  document.body.classList.add('lang-' + lang);
  applyStaticTranslations();
  const fromHash = decodeStateFromHash(location.hash);
  if (fromHash) {
    state = fromHash;
    history.replaceState(null, '', location.pathname + location.search);
    render();
    scheduleSave();
    return;
  }
  const draft = loadDraft();
  if (draft) {
    state = draft;
    render();
    return;
  }
  render();
})();
</script>
</body>
